<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ludovik</title>
<meta name="description" content="Ludovik">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>L</text></svg>">
<style>
  :root{
    --bg:#ffffff; --fg:#111110; --muted:#9a998f;
    --line:rgba(17,17,16,.12);
    --recv:#ececea; --sent:#111110;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%}
  body{
    background:var(--bg);color:var(--fg);
    font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:48px 32px;
  }
  main{width:100%;max-width:420px}
  .name{font-size:44px;font-weight:600;letter-spacing:-.02em;text-align:center}
  .handle{text-align:center;color:var(--muted);font-size:14px;margin-top:10px;letter-spacing:.02em}
  nav{margin-top:44px;border-top:1px solid var(--line)}
  a.link{display:flex;align-items:center;justify-content:space-between;padding:18px 4px;
    border-bottom:1px solid var(--line);color:var(--fg);text-decoration:none;font-size:16px;
    transition:opacity .18s ease,padding-left .18s ease}
  a.link .arrow{color:var(--muted);font-size:15px;transition:transform .18s ease,color .18s ease}
  a.link:hover{padding-left:12px}
  a.link:hover .arrow{transform:translateX(4px);color:var(--fg)}

  .contact{margin-top:52px}
  .contact h2{font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
  .chat{border:1px solid var(--line);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;background:rgba(255,255,255,.02)}
  .msgs{padding:16px;display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto}
  .b{max-width:80%;padding:10px 14px;font-size:15px;line-height:1.35;border-radius:18px;word-wrap:break-word;animation:pop .18s ease}
  .b.recv{align-self:flex-start;background:var(--recv);color:#111110;border-bottom-left-radius:6px}
  .b.sent{align-self:flex-end;background:var(--sent);color:#fff;border-bottom-right-radius:6px}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .bar{display:flex;align-items:center;gap:10px;padding:10px;border-top:1px solid var(--line)}
  .bar input{flex:1;background:transparent;border:none;color:var(--fg);font:inherit;font-size:15px;outline:none;padding:8px 4px}
  .send{width:34px;height:34px;flex:none;border:none;border-radius:50%;background:var(--fg);color:#fff;
    font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .18s ease}
  .send:hover{opacity:.85}
  .send:disabled{opacity:.35;cursor:default}
  footer{margin-top:44px;text-align:center;color:var(--muted);font-size:12px;letter-spacing:.04em}
  @media (max-width:480px){ .name{font-size:36px} }
</style>
</head>
<body>
  <main>
    <h1 class="name">Ludovik</h1>
    <p class="handle">@ludovik</p>

    <nav>
      <a class="link" href="https://www.youtube.com/@ludovik" target="_blank" rel="noopener"><span>YouTube</span><span class="arrow">&#8599;</span></a>
      <a class="link" href="https://www.tiktok.com/@ludovik" target="_blank" rel="noopener"><span>TikTok</span><span class="arrow">&#8599;</span></a>
      <a class="link" href="https://www.instagram.com/ludovik" target="_blank" rel="noopener"><span>Instagram</span><span class="arrow">&#8599;</span></a>
      <a class="link" href="https://www.facebook.com/ludovik" target="_blank" rel="noopener"><span>Facebook</span><span class="arrow">&#8599;</span></a>
    </nav>

    <section class="contact">
      <h2>Contact</h2>
      <div class="chat">
        <div class="msgs" id="msgs"></div>
        <div class="bar">
          <input id="in" type="text" autocomplete="off" placeholder="Écris ici...">
          <button class="send" id="send" aria-label="Envoyer">&#8593;</button>
        </div>
      </div>
    </section>

    <footer>Ludovik</footer>
  </main>

<script>
const msgs=document.getElementById('msgs'),input=document.getElementById('in'),send=document.getElementById('send');
const data={name:'',email:'',message:''};
let step=0;
const script=[
  "Salut, un petit message ? Comment tu t'appelles ?",
  "Enchanté ! Ton email pour que je te réponde ?",
  "Parfait. Dis-moi tout, ton message :"
];
function bubble(txt,cls){const d=document.createElement('div');d.className='b '+cls;d.textContent=txt;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;}
function bot(txt){setTimeout(()=>bubble(txt,'recv'),300);}
bubble(script[0],'recv');

async function submit(){
  bot("Merci "+ (data.name||'') +", c'est envoyé. Je te réponds vite.");
  input.disabled=true; send.disabled=true; input.placeholder="Message envoyé";
  try{
    await fetch('https://formsubmit.co/ajax/ldvk@me.com',{
      method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({name:data.name,email:data.email,message:data.message,_subject:'Message depuis ludovik',_captcha:'false'})
    });
  }catch(_){}
}
function next(){
  const v=input.value.trim(); if(!v) return;
  bubble(v,'sent'); input.value='';
  if(step===0){ data.name=v; step=1; bot(script[1]); }
  else if(step===1){
    if(!/.+@.+\..+/.test(v)){ bot("Hmm, cet email a l'air bizarre, réessaie ?"); return; }
    data.email=v; step=2; bot(script[2]);
  }
  else if(step===2){ data.message=v; submit(); }
}
send.addEventListener('click',next);
input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();next();}});
</script>
</body>
</html>
