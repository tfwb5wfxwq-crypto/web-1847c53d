<style>
  :root{
    --bg:#f7f6f3; --fg:#1a1a19; --muted:#9b9a93;
    --card:#ffffff; --line:rgba(0,0,0,.07);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%}
  body{
    background:var(--bg);color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;justify-content:center;min-height:100dvh;padding:60px 22px 40px;
  }
  main{width:100%;max-width:392px}

  .avwrap{width:96px;height:96px;margin:34px auto 0;position:relative}
  .avatar{width:96px;height:96px;border-radius:50%;overflow:hidden;
    background:#1a1a19;box-shadow:0 2px 10px rgba(0,0,0,.08)}
  .avatar img{width:100%;height:100%;object-fit:cover;display:block}
  .note{position:absolute;top:-36px;left:50%;transform:translateX(-50%);
    background:#fff;color:#1a1a19;font-size:13px;font-weight:500;white-space:nowrap;
    padding:7px 13px;border-radius:16px;box-shadow:0 5px 16px rgba(0,0,0,.10)}
  .note::after{content:"";position:absolute;left:50%;transform:translateX(-50%);bottom:-7px;width:0;height:0;
    border-left:7px solid transparent;border-right:7px solid transparent;border-top:8px solid #fff}
  .dot{position:absolute;right:4px;bottom:4px;width:20px;height:20px;border-radius:50%;
    background:#34c759;border:3.5px solid var(--bg);box-shadow:0 1px 3px rgba(0,0,0,.15)}
  .name{font-size:25px;font-weight:600;letter-spacing:-.02em;text-align:center;margin-top:18px}
  .handle{text-align:center;color:var(--muted);font-size:14px;margin-top:3px}

  .list{background:var(--card);border-radius:16px;border:1px solid var(--line);
    box-shadow:0 1px 2px rgba(0,0,0,.03);overflow:hidden;margin-top:30px}
  a.link{display:flex;align-items:center;gap:15px;padding:15px 16px;color:var(--fg);text-decoration:none;
    font-size:15.5px;font-weight:500;position:relative;transition:background .14s ease}
  a.link:not(:last-child)::after{content:"";position:absolute;left:53px;right:0;bottom:0;height:1px;background:var(--line)}
  a.link:active{background:rgba(0,0,0,.04)}
  @media(hover:hover){a.link:hover{background:rgba(0,0,0,.025)}}
  .ic{width:23px;height:23px;flex:none}
  .link.yt .ic{fill:#FF0000}
  .link.tt .ic{fill:#111}
  .link.ig .ic{fill:url(#igGrad)}
  .link.fb .ic{fill:#1877F2}
  .ic.mono{fill:#b9b8b1}
  .link .txt{flex:1}
  .link .txt small{display:block;color:var(--muted);font-size:12.5px;font-weight:400;margin-top:2px}
  .chev{color:#cbcac3;font-size:18px;font-weight:600;transition:color .14s ease}
  @media(hover:hover){a.link:hover .chev{color:#8a897f}}
  .sechead{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:28px 6px 9px}
  footer{margin-top:34px;text-align:center;color:#c3c2ba;font-size:11px;letter-spacing:.04em}
  .toast{position:fixed;left:50%;bottom:calc(28px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(16px);
    background:#1a1a19;color:#fff;padding:13px 20px;border-radius:14px;font-size:14px;font-weight:500;
    opacity:0;transition:opacity .22s ease,transform .22s ease;pointer-events:none;z-index:100;
    box-shadow:0 8px 30px rgba(0,0,0,.25);max-width:88vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<script>
(function(){
  var T="https://xhpsdbmajanmoztijbnx.supabase.co/functions/v1/lk";
  var s=new URLSearchParams(location.search).get("s")||"";
  var r=document.referrer||"";
  function ping(e){
    var u=T+"?e="+encodeURIComponent(e)+"&s="+encodeURIComponent(s)+"&r="+encodeURIComponent(r);
    try{navigator.sendBeacon(u);}catch(_){try{fetch(u,{mode:"no-cors",keepalive:true});}catch(e2){}}
  }
  try{if(!sessionStorage.getItem("v")){sessionStorage.setItem("v","1");ping("view");}}catch(_){ping("view");}
  document.querySelectorAll("a.link").forEach(function(a){
    a.addEventListener("click",function(){
      var h=a.getAttribute("href")||"";
      var n=/youtube/.test(h)?"YouTube":/tiktok/.test(h)?"TikTok":/instagram/.test(h)?"Instagram":/facebook/.test(h)?"Facebook":/astalents/.test(h)?"Email agent":/mailto/.test(h)?"Email partenariats":"lien";
      ping("click:"+n);
    });
  });

  var toastEl;
  function toast(msg){
    if(!toastEl){toastEl=document.createElement("div");toastEl.className="toast";document.body.appendChild(toastEl);}
    toastEl.textContent=msg;toastEl.classList.add("show");
    clearTimeout(toastEl._t);toastEl._t=setTimeout(function(){toastEl.classList.remove("show");},2600);
  }
  var isTikTok=/musical_ly|bytedance|trill|tiktok|aweme/i.test(navigator.userAgent);
  if(isTikTok){
    document.querySelectorAll('a.link[target="_blank"]').forEach(function(a){ a.removeAttribute("target"); a.removeAttribute("rel"); });
  }
  document.querySelectorAll('a[href^="mailto:"]').forEach(function(a){
    a.addEventListener("click",function(ev){
      if(!isTikTok) return;
      ev.preventDefault();
      var email=(a.getAttribute("href")||"").replace("mailto:","").split("?")[0];
      var copied=false;
      try{ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(email); copied=true; } }catch(_){}
      if(!copied){ try{ var ta=document.createElement("textarea");ta.value=email;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);copied=true; }catch(_){} }
      toast(copied ? ("✅ "+email+" copié, colle-le dans ton mail") : email);
    });
  });
})();
</script>
